<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Risk It</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--surface:#0f0f1c;--card:#141428;--border:#252545;
  --accent:#f5e642;--teal:#3fecd5;--danger:#ff5050;--success:#3fd882;
  --text:#eeeef8;--muted:#55558a;
  --fd:'Bebas Neue',sans-serif;--fb:'Manrope',sans-serif;--fm:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:16px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(245,230,66,.07),transparent)}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 16px}
.screen{display:none;width:100%;max-width:500px;flex-direction:column;gap:18px}
.screen.active{display:flex;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes shine{from{left:-100%}to{left:150%}}
.logo{font-family:var(--fd);font-size:80px;letter-spacing:6px;color:var(--accent);text-align:center;line-height:1;user-select:none}
.logo em{color:var(--text);font-style:normal}
.sub{font-family:var(--fm);font-size:11px;letter-spacing:3px;color:var(--muted);text-align:center;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.card-title{font-family:var(--fd);font-size:24px;letter-spacing:2px;color:var(--accent);margin-bottom:12px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
input[type=file]{width:100%;background:var(--surface);border:1px dashed var(--border);border-radius:10px;
  padding:20px;color:var(--muted);font-family:var(--fm);font-size:13px;cursor:pointer;transition:border-color .2s}
input[type=file]:hover{border-color:var(--accent);color:var(--text)}
input[type=number]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;color:var(--text);font-family:var(--fm);font-size:15px;outline:none;transition:border-color .2s}
input[type=number]:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn{display:block;width:100%;padding:15px;border-radius:12px;border:none;font-family:var(--fd);
  font-size:22px;letter-spacing:2px;cursor:pointer;transition:transform .1s,opacity .15s;
  position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:rgba(255,255,255,.25);transform:skewX(-20deg)}
.btn-primary:hover:not(:disabled)::after{animation:shine .4s ease}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.wager-wrap{display:flex;align-items:center;gap:14px}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;background:var(--border);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;
  border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.wager-big{font-family:var(--fd);font-size:48px;letter-spacing:3px;color:var(--accent);min-width:110px;text-align:right}
.score-lbl{font-family:var(--fm);font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:4px}
.score-num{font-family:var(--fd);font-size:64px;letter-spacing:4px;color:var(--accent);text-align:center;line-height:1}
.timer-row{display:flex;justify-content:space-between;align-items:center}
.timer-num{font-family:var(--fd);font-size:22px;color:var(--accent);letter-spacing:2px}
.q-count{font-family:var(--fm);font-size:12px;color:var(--muted)}
.timer-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.timer-fill{height:100%;background:var(--accent);border-radius:3px;transition:background .4s}
.q-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:16px 20px;cursor:pointer;font-weight:600;font-size:15px;
  display:flex;align-items:center;gap:14px;
  transition:border-color .15s,background .15s,transform .12s}
.opt:hover:not(.locked){border-color:var(--accent);background:#1a1a30;transform:translateX(5px)}
.opt.picked{border-color:var(--teal);background:#0d2228}
.opt.correct{border-color:var(--success);background:#0b2215}
.opt.wrong{border-color:var(--danger);background:#250b0b}
.opt.locked{cursor:default}
.opt-letter{font-family:var(--fd);font-size:20px;color:var(--muted);min-width:22px;letter-spacing:1px}
.opt.correct .opt-letter{color:var(--success)}
.opt.wrong   .opt-letter{color:var(--danger)}
.opt.picked  .opt-letter{color:var(--teal)}
.result-word{font-family:var(--fd);font-size:72px;text-align:center;letter-spacing:4px;animation:pop .4s ease}
.result-word.win{color:var(--success)}
.result-word.lose{color:var(--danger)}
.delta{font-family:var(--fd);font-size:44px;text-align:center;letter-spacing:3px}
.delta.pos{color:var(--success)}
.delta.neg{color:var(--danger)}
.progress-track{height:3px;background:var(--border);border-radius:2px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.recap-row{display:flex;align-items:center;gap:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:12px 16px;
  animation:up .3s ease both}
.recap-num{font-family:var(--fd);font-size:22px;color:var(--muted);min-width:28px}
.recap-q{font-family:var(--fb);font-size:13px;flex:1;color:var(--muted);line-height:1.4}
.recap-delta{font-family:var(--fd);font-size:18px;letter-spacing:1px}
.recap-delta.pos{color:var(--success)}
.recap-delta.neg{color:var(--danger)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--danger);color:#fff;padding:12px 24px;border-radius:10px;
  font-weight:700;font-size:14px;transition:transform .3s ease;z-index:999;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="s-home" class="screen">
    <div>
      <div class="logo">RISK<em>IT</em></div>
      <div class="sub">wager everything · trust nothing</div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">Play</button>
  </div>

  <!-- WAGER -->
  <div id="s-wager" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:var(--fd);font-size:36px;letter-spacing:2px;color:var(--accent)">WAGER</div>
      <div class="q-count" id="w-count"></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="w-progress"></div></div>
    <div class="card">
      <div class="score-lbl">Current score</div>
      <div class="score-num" id="w-score">1000</div>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <label>How much do you risk?</label>
      <div class="wager-wrap">
        <input type="range" id="w-range" min="0" value="0" oninput="syncW(this.value,'r')">
        <div class="wager-big" id="w-disp">0</div>
      </div>
      <input type="number" id="w-num" min="0" value="0" placeholder="or type amount" oninput="syncW(this.value,'n')">
      <button class="btn btn-primary" onclick="lockWager()">Lock In Wager</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="s-question" class="screen">
    <div class="timer-row">
      <div class="timer-num" id="t-num">30</div>
      <div class="q-count" id="q-count"></div>
    </div>
    <div class="timer-track"><div class="timer-fill" id="t-fill"></div></div>
    <div class="card">
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="screen">
    <div class="result-word" id="r-word"></div>
    <div class="delta" id="r-delta"></div>
    <div class="card">
      <div class="score-lbl">Score</div>
      <div class="score-num" id="r-score"></div>
    </div>
    <div class="card">
      <div class="card-title" style="font-size:18px">Answer</div>
      <div class="opts" id="r-opts"></div>
    </div>
    <button class="btn btn-primary" id="r-next" onclick="nextQuestion()">Next Question</button>
  </div>

  <!-- END -->
  <div id="s-end" class="screen">
    <div class="logo" style="font-size:56px">GAME<em>!</em></div>
    <div class="card">
      <div class="score-lbl">Final score</div>
      <div class="score-num" id="end-score"></div>
    </div>
    <div class="card">
      <div class="card-title" style="font-size:20px">Recap</div>
      <div id="end-recap" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
    </div>
    <button class="btn btn-primary" onclick="playAgain()">Play Again</button>
  </div>

</div>
<div id="toast"></div>
<script>
const TIMER_SECS = 30; // seconds per question

const QUESTIONS = [
  {
    question: "What is the capital of France?",
    options: ["Berlin", "Madrid", "Paris", "Rome"],
    correctIndex: 2
  },
  {
    question: "How many sides does a hexagon have?",
    options: ["5", "6", "7", "8"],
    correctIndex: 1
  },
  {
    question: "What is 12 × 12?",
    options: ["124", "144", "132", "148"],
    correctIndex: 1
  }
];

// --- nothing below here needs changing ---
let questions = QUESTIONS;
let qIndex=0, score=1000, wager=0;
let timerInt=null, timerSecs=TIMER_SECS, answered=false, recap=[];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadFile(input){
  const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d)||!d.length)return toast('Needs an array of questions');
      for(const q of d)
        if(!q.question||!Array.isArray(q.options)||typeof q.correctIndex!=='number')
          return toast('Each question needs: question, options[], correctIndex');
      questions=d;
      const s=document.getElementById('file-status');
      s.textContent=`✓ ${d.length} question${d.length>1?'s':''} loaded`;
      s.style.color='var(--success)';
      document.getElementById('play-btn').disabled=false;
    }catch{toast('Could not parse file');}
  };
  r.readAsText(file);
}

function startGame(){
  timerSecs=parseInt(document.getElementById('timer-setting').value)||30;
  qIndex=0; score=1000; recap=[]; showWager();
}

function showWager(){
  const half=Math.floor(score/2);
  document.getElementById('w-count').textContent=`${qIndex+1} / ${questions.length}`;
  document.getElementById('w-score').textContent=score.toLocaleString();
  document.getElementById('w-progress').style.width=((qIndex/questions.length)*100)+'%';
  const rng=document.getElementById('w-range'), num=document.getElementById('w-num');
  rng.max=score; rng.value=half;
  num.max=score; num.value=half;
  document.getElementById('w-disp').textContent=half;
  wager=half; show('wager');
}

function syncW(val,from){
  const max=parseInt(document.getElementById('w-range').max)||score;
  val=Math.max(0,Math.min(max,parseInt(val)||0));
  if(from!=='r')document.getElementById('w-range').value=val;
  if(from!=='n')document.getElementById('w-num').value=val;
  document.getElementById('w-disp').textContent=val;
  wager=val;
}

function lockWager(){
  wager=Math.max(0,Math.min(score,parseInt(document.getElementById('w-num').value)||0));
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=questions[qIndex], lets=['A','B','C','D','E'];
  document.getElementById('q-count').textContent=`${qIndex+1} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.question;
  document.getElementById('q-opts').innerHTML=q.options.map((o,i)=>`
    <div class="opt" id="opt-${i}" onclick="pick(${i})">
      <span class="opt-letter">${lets[i]}</span><span>${esc(o)}</span>
    </div>`).join('');
  startTimer(timerSecs); show('question');
}

function startTimer(secs){
  clearInterval(timerInt);
  let left=secs;
  const fill=document.getElementById('t-fill'), num=document.getElementById('t-num');
  fill.style.width='100%'; fill.style.background='var(--accent)';
  num.style.color='var(--accent)'; num.textContent=left;
  timerInt=setInterval(()=>{
    left--;
    const pct=(left/secs)*100;
    const col=pct>40?'var(--accent)':pct>20?'#f0a030':'var(--danger)';
    fill.style.width=pct+'%'; fill.style.background=col;
    num.style.color=col; num.textContent=left;
    if(left<=0){clearInterval(timerInt); timeUp();}
  },1000);
}

function timeUp(){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
  resolve(-1);
}

function pick(i){
  if(answered)return;
  answered=true; clearInterval(timerInt);
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));
  document.getElementById('opt-'+i).classList.add('picked');
  resolve(i);
}

function resolve(picked){
  const q=questions[qIndex];
  const correct=picked===q.correctIndex;
  const delta=correct?wager:-wager;
  score=Math.max(0,score+delta);
  recap.push({question:q.question,correct,wager,delta});
  setTimeout(()=>showResult(correct,delta,picked,q),600);
}

function showResult(correct,delta,picked,q){
  const lets=['A','B','C','D','E'];
  const label=picked===-1?'TIME UP':correct?'CORRECT':'WRONG';
  document.getElementById('r-word').textContent=label;
  document.getElementById('r-word').className='result-word '+(correct?'win':'lose');
  document.getElementById('r-delta').textContent=(delta>=0?'+':'')+delta.toLocaleString();
  document.getElementById('r-delta').className='delta '+(delta>=0?'pos':'neg');
  document.getElementById('r-score').textContent=score.toLocaleString();
  document.getElementById('r-opts').innerHTML=q.options.map((o,i)=>`
    <div class="opt locked ${i===q.correctIndex?'correct':(i===picked&&!correct?'wrong':'')}">
      <span class="opt-letter">${lets[i]}</span><span>${esc(o)}</span>
    </div>`).join('');
  const last=qIndex>=questions.length-1;
  document.getElementById('r-next').textContent=last?'See Results':'Next Question';
  show('result');
}

function nextQuestion(){
  qIndex++;
  if(qIndex>=questions.length) showEnd(); else showWager();
}

function showEnd(){
  document.getElementById('end-score').textContent=score.toLocaleString();
  document.getElementById('end-recap').innerHTML=recap.map((r,i)=>`
    <div class="recap-row" style="animation-delay:${i*.05}s">
      <div class="recap-num">${i+1}</div>
      <div class="recap-q">${esc(r.question.length>50?r.question.slice(0,50)+'…':r.question)}</div>
      <div class="recap-delta ${r.delta>=0?'pos':'neg'}">${r.delta>=0?'+':''}${r.delta.toLocaleString()}</div>
    </div>`).join('');
  show('end');
}

function playAgain(){ qIndex=0; score=1000; recap=[]; show('home'); }

show('home');
</script>
</body>
</html>
